name: CivicSync CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: civicsync
          POSTGRES_PASSWORD: civicsync123
          POSTGRES_DB: civicsync_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
          
      - name: Install dependencies
        working-directory: ./backend
        run: npm ci || npm install
        
      - name: Generate Prisma Client
        working-directory: ./backend
        run: npx prisma generate
        
      - name: Run Linting
        working-directory: ./backend
        run: npm run lint --if-present
        
      - name: Run Unit Tests
        working-directory: ./backend
        env:
          DATABASE_URL: postgresql://civicsync:civicsync123@localhost:5432/civicsync_db
          JWT_SECRET: test-secret
        run: npm test --if-present

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
          
      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci || npm install
        
      - name: Build Next.js
        working-directory: ./frontend
        run: npm run build

  e2e-tests:
    needs: [backend-test, frontend-build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          working-directory: ./cypress
          build: npm run build
          start: npm run start
          wait-on: 'http://localhost:3000'
