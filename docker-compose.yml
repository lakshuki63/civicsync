version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: civicsync-postgres
    environment:
      POSTGRES_USER: civicsync
      POSTGRES_PASSWORD: civicsync123
      POSTGRES_DB: civicsync_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civicsync -d civicsync_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: civicsync-backend
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=postgresql://civicsync:civicsync123@postgres:5432/civicsync_db
      - JWT_SECRET=civicsync-super-secret-jwt-key-change-in-production
      - JWT_EXPIRES_IN=7d
      - PORT=5000
      - NODE_ENV=development
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma migrate dev --name init && node prisma/seed.js && npm run dev"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: civicsync-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
      - NEXT_PUBLIC_APP_NAME=CivicSync
      - NEXT_PUBLIC_RAZORPAY_KEY=rzp_test_placeholder
    depends_on:
      - backend

volumes:
  pgdata:
